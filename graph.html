<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Word Graph — 单词网络</title>
<style>
:root{
  --bg:#1c1c1e; --card:#2c2c2e; --cardHover:#38383a;
  --text:#f5f5f7; --text2:#aeaeb2; --text3:#636366;
  --accent:#0a84ff; --accentBg:rgba(10,132,255,0.12);
  --green:#30d158; --orange:#ff9f0a; --red:#ff453a; --purple:#bf5af2;
  --edge-root:#30d158; --edge-syn:#0a84ff; --edge-ant:#ff453a;
  --edge-theme:#ff9f0a; --edge-coll:#aeaeb2;
  --shadow:0 2px 16px rgba(0,0,0,0.3), 0 0 0 0.5px rgba(255,255,255,0.06);
  --shadowLg:0 8px 40px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.08);
  --radius:18px; --radiusSm:12px; --radiusPill:100px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',system-ui,sans-serif;
  background:var(--bg); color:var(--text); overflow:hidden; height:100dvh; width:100vw;
  -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
  user-select:none; -webkit-user-select:none;
}

#graphSvg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;}
#graphSvg line,#graphSvg text{transition:opacity 0.4s ease;}

/* ── Top Bar (frosted glass) ── */
.top-bar{
  position:fixed;top:0;left:0;right:0;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px; gap:12px;
  background:rgba(28,28,30,0.72); backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  border-bottom:0.5px solid rgba(255,255,255,0.08);
}
.top-bar h1{font-size:1.05rem;font-weight:700;color:var(--text);letter-spacing:-0.3px;white-space:nowrap;}
.top-bar .btn-group{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;}
.top-bar button{
  background:rgba(255,255,255,0.06); border:none; color:var(--text2);
  padding:7px 14px; border-radius:var(--radiusPill); font-size:0.78rem; font-weight:500;
  cursor:pointer; font-family:inherit; transition:all 0.2s ease;
  -webkit-tap-highlight-color:transparent; letter-spacing:-0.2px;
}
.top-bar button:hover{background:rgba(255,255,255,0.12);color:var(--text);}
.top-bar button.accent{background:var(--accent);color:#fff;font-weight:600;}
.top-bar button.accent:hover{background:#1a8eff;}

/* ── Edge Legend (frosted panel) ── */
.edge-legend{
  position:fixed;right:16px;top:110px;z-index:10;
  display:flex;flex-direction:column;gap:6px;
  background:rgba(44,44,46,0.8); backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  padding:12px 14px; border-radius:var(--radiusSm);
  box-shadow:var(--shadow);
}
.edge-legend label{
  font-size:0.7rem;display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--text2);font-weight:450;
}
.edge-legend input[type=checkbox]{appearance:none;-webkit-appearance:none;width:14px;height:14px;border-radius:4px;border:1px solid var(--text3);cursor:pointer;position:relative;transition:all 0.15s;}
.edge-legend input[type=checkbox]:checked{background:var(--accent);border-color:var(--accent);}
.edge-legend input[type=checkbox]:checked::after{content:'✓';position:absolute;top:-1px;left:2px;font-size:10px;color:#fff;}
.e-dot{width:7px;height:7px;border-radius:50%;display:inline-block;}

/* ── Peripheral Nodes ── */
.graph-node{
  position:fixed;z-index:2;
  background:var(--card); border-radius:var(--radiusSm);
  padding:14px 18px; cursor:pointer; text-align:center; min-width:100px;
  box-shadow:var(--shadow); border:0.5px solid rgba(255,255,255,0.04);
  transition:all 0.35s cubic-bezier(0.25,0.1,0.25,1);
  -webkit-tap-highlight-color:transparent;
}
.graph-node:hover,.graph-node:active{
  background:var(--cardHover);
  box-shadow:var(--shadowLg);
  transform:scale(1.06) translateY(-2px);
}
.graph-node .n-word{font-size:0.88rem;font-weight:650;color:var(--text);letter-spacing:-0.2px;}
.graph-node .n-zh{font-size:0.7rem;color:var(--text2);margin-top:3px;}
.graph-node .n-edge{font-size:0.62rem;font-weight:500;text-transform:uppercase;letter-spacing:0.5px;margin-top:5px;}

/* ── Center Card ── */
.graph-center{
  position:fixed;z-index:3;
  background:var(--card); border-radius:22px;
  padding:28px 30px; width:320px; text-align:center;
  box-shadow:var(--shadowLg);
  border:1px solid rgba(255,255,255,0.06);
  transition:all 0.5s cubic-bezier(0.25,0.1,0.25,1);
  -webkit-tap-highlight-color:transparent;
}
.graph-center .c-word{font-size:2rem;font-weight:780;color:var(--text);letter-spacing:-0.5px;line-height:1.1;}
.graph-center .c-meta{display:flex;align-items:center;justify-content:center;gap:8px;margin:8px 0;flex-wrap:wrap;}
.graph-center .c-phon{font-size:0.82rem;color:var(--text2);letter-spacing:0.3px;}
.graph-center .c-pos{
  display:inline-block;background:var(--accentBg);color:var(--accent);
  padding:3px 10px;border-radius:var(--radiusPill);font-size:0.7rem;font-weight:550;
}
.graph-center .c-level{
  display:inline-block;padding:3px 10px;border-radius:var(--radiusPill);font-size:0.7rem;font-weight:550;
}
.graph-center .c-def{font-size:0.92rem;color:var(--text2);margin:10px 0;line-height:1.5;}
.graph-center .c-ex{
  background:rgba(255,255,255,0.025);border-left:2.5px solid var(--accent);
  padding:10px 14px;border-radius:0 10px 10px 0;font-size:0.84rem;color:var(--text);font-style:italic;
  margin:10px 0;text-align:left;line-height:1.5;
}
.graph-center .c-root{font-size:0.75rem;color:var(--text3);margin:8px 0;line-height:1.4;}

/* ── Rating Pills ── */
.rating-row{display:flex;gap:8px;justify-content:center;margin-top:14px;}
.rating-row button{
  flex:1;padding:9px 6px;border-radius:var(--radiusPill);border:none;
  background:rgba(255,255,255,0.04);color:var(--text2);font-size:0.73rem;font-weight:550;
  cursor:pointer;font-family:inherit;transition:all 0.2s ease;
  -webkit-tap-highlight-color:transparent;
}
.rating-row button:hover{background:rgba(255,255,255,0.08);}
.rating-row .r-unknown.active,.rating-row .r-unknown:hover{background:rgba(255,69,58,0.15);color:var(--red);}
.rating-row .r-vague.active,.rating-row .r-vague:hover{background:rgba(255,159,10,0.15);color:var(--orange);}
.rating-row .r-master.active,.rating-row .r-master:hover{background:rgba(48,209,88,0.15);color:var(--green);}

/* ── Trail (bottom) ── */
.trail-wrap{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:10;
  display:flex;gap:3px;align-items:center;flex-wrap:wrap;justify-content:center;
  max-width:90vw;padding:8px 16px;
  background:rgba(44,44,46,0.7);backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-radius:var(--radiusPill);box-shadow:var(--shadow);
}
.trail-wrap .t-node{
  background:transparent;border:none;padding:4px 10px;border-radius:var(--radiusPill);
  font-size:0.7rem;color:var(--text2);cursor:pointer;transition:all 0.15s;font-family:inherit;font-weight:500;
}
.trail-wrap .t-node:hover{background:rgba(255,255,255,0.08);color:var(--text);}
.trail-wrap .t-arrow{color:var(--text3);font-size:0.6rem;margin:0 2px;}
.trail-wrap .t-current{background:var(--accentBg);color:var(--accent);font-weight:600;}

/* ── Responsive ── */
@media(max-width:640px){
  .graph-center{width:280px;padding:22px 20px;}
  .graph-center .c-word{font-size:1.6rem;}
  .graph-node{min-width:70px;padding:10px 12px;}
  .graph-node .n-word{font-size:0.76rem;}
  .edge-legend{right:6px;padding:8px 10px;gap:4px;}
  .edge-legend label{font-size:0.64rem;}
  .top-bar{padding:10px 12px;}
  .top-bar h1{font-size:0.9rem;}
  .top-bar button{padding:5px 10px;font-size:0.7rem;}
  .rating-row button{font-size:0.68rem;padding:7px 4px;}
}
</style>
</head>
<body>

<svg id="graphSvg"></svg>

<!-- Top Bar -->
<div class="top-bar">
  <h1>🕸️ Word Graph</h1>
  <div class="btn-group">
    <button onclick="randomJump()">⚡ 随机跳转</button>
    <button onclick="goBack()">← 后退</button>
    <button onclick="resetGraph()">🔄 重置</button>
    <button style="font-size:0.7rem;opacity:0.7;" onclick="window.open('screening.html','_blank')">筛词</button>
    <button style="font-size:0.7rem;opacity:0.7;" onclick="window.open('flashcards.html','_blank')">造句</button>
  </div>
</div>

<!-- Legend -->
<div class="edge-legend" id="edgeLegend">
  <label><input type="checkbox" checked onchange="toggleEdges()" data-type="root"><span class="e-dot" style="background:var(--edge-root)"></span>同根词</label>
  <label><input type="checkbox" checked onchange="toggleEdges()" data-type="syn"><span class="e-dot" style="background:var(--edge-syn)"></span>近义词</label>
  <label><input type="checkbox" checked onchange="toggleEdges()" data-type="ant"><span class="e-dot" style="background:var(--edge-ant)"></span>反义词</label>
  <label><input type="checkbox" checked onchange="toggleEdges()" data-type="theme"><span class="e-dot" style="background:var(--edge-theme)"></span>同主题</label>
  <label><input type="checkbox" checked onchange="toggleEdges()" data-type="coll"><span class="e-dot" style="background:var(--edge-coll)"></span>搭配词</label>
</div>

<!-- Trail -->
<div class="trail-wrap" id="trail"></div>

<script src="wordbank.js"></script>
<script src="word-families.js"></script>
<script>
// ============================================================
// DATA
// ============================================================
const WORD_BANK = WORD_BANK_W;

const ANTONYMS = {
  accept:'refuse',refuse:'accept',increase:'decrease',decrease:'increase',
  temporary:'permanent',permanent:'temporary',positive:'negative',negative:'positive',
  generous:'selfish',selfish:'generous',external:'internal',internal:'external',
  majority:'minority',minority:'majority',advantage:'disadvantage',disadvantage:'advantage',
  guilty:'innocent',innocent:'guilty',formal:'casual',casual:'formal',
};

const THEMES = {
  'Work':['schedule','deadline','budget','colleague','presentation','interview','promote','negotiate','client','employ','manage','achieve','goal','strategy','perform','contribute','cooperate','feedback','compromise','responsibility','appointment','customer','policy','procedure','application','department','contract','agreement'],
  'Emotions':['disappointed','grateful','proud','jealous','guilty','anxious','nervous','relieved','confident','confused','annoyed','embarrassed','curious','brave','patient','generous','selfish','honest','eager','reluctant','calm','sensitive','tough','desperate','enthusiastic','innocent','regret','suffer','comfort','praise'],
  'Communication':['conversation','dialogue','argument','debate','negotiate','persuade','suggest','mention','describe','explain','express','declare','emphasize','summarize','request','complain','apologize','respond','interrupt','criticize','compliment','consult','warn','promise','insist','advocate','acknowledge','inform','indicate','interpret'],
  'Tech/AI':['access','device','network','data','platform','application','install','develop','design','create','innovation','digital','software','hardware','internet','connect','efficient','transform','research','analysis','solution','artificial','capture','display','signal','generate','implement','program','compute','automate'],
  'Daily':['habit','routine','comfort','convenient','waste','bother','manage','handle','deal','struggle','survive','balance','afford','prefer','prepare','organize','arrange','cancel','decide','choose','option','opportunity','risk','effort','attention','progress','improve','reduce','adjust','adapt'],
  'Learning':['research','analysis','definition','concept','principle','theory','evidence','prove','demonstrate','examine','evaluate','assess','determine','identify','recognize','realize','discover','explore','conclude','summarize','illustrate','define','describe','compare','contrast','calculate','measure','concentrate','focus','understand'],
  'Change':['increase','decrease','improve','reduce','develop','transform','evolve','adapt','adjust','progress','decline','expand','extend','eliminate','replace','reform','modify','convert','grow','rise','fall','emerge','disappear','create','destroy','establish','abandon','shift','alter','shrink'],
  'Society':['culture','tradition','community','population','economy','government','policy','election','justice','rights','responsibility','freedom','conflict','protest','reform','education','environment','resource','poverty','wealth','majority','minority','individual','society','global','local','public','private','diverse','equality'],
};

const WORD_THEMES = {};
Object.entries(THEMES).forEach(([theme,words])=>{
  words.forEach(w=>{if(!WORD_THEMES[w])WORD_THEMES[w]=[];WORD_THEMES[w].push(theme);});
});

// ============================================================
// STATE
// ============================================================
let currentWordId=null, history=[], activeEdges={root:true,syn:true,ant:true,theme:true,coll:true};
let nodeElements=[];

// ============================================================
// GRAPH LOGIC
// ============================================================
function getWordData(word){ const i=WORD_BANK.findIndex(w=>w.w===word); return i>=0?WORD_BANK[i]:null; }

function getConnections(word){
  const result=[], wData=getWordData(word);
  if(!wData)return result;
  // Root family
  const family=findRootFamily(word);
  if(family){Object.keys(family.words).forEach(w=>{if(w!==word&&WORD_BANK.some(x=>x.w===w))result.push({word:w,type:'root',label:family.root.split('=')[0].trim()});});}
  // Synonyms
  if(wData.syn){wData.syn.split(/[,，]/).forEach(s=>{const sw=s.trim();if(sw&&sw!==word&&WORD_BANK.some(x=>x.w===sw&&!result.find(r=>r.word===sw)))result.push({word:sw,type:'syn',label:'近义'});});}
  // Antonyms
  if(ANTONYMS[word]){const ant=ANTONYMS[word];if(WORD_BANK.some(x=>x.w===ant))result.push({word:ant,type:'ant',label:'反义'});}
  // Theme
  if(WORD_THEMES[word]){WORD_THEMES[word].forEach(t=>{(THEMES[t]||[]).forEach(tw=>{if(tw!==word&&!result.find(r=>r.word===tw)&&WORD_BANK.some(x=>x.w===tw)&&result.filter(r=>r.type==='theme').length<3)result.push({word:tw,type:'theme',label:t});});});}
  // Collocations
  if(wData.coll){wData.coll.split('/').forEach(p=>{p.trim().split(/\s+/).filter(w=>w.length>3&&!/^(the|and|or|to|in|on|at|for|of|with|by|that|not|from)$/i.test(w)).forEach(cw=>{const cl=cw.replace(/[(),….;:]/g,'');if(cl!==word&&WORD_BANK.some(x=>x.w===cl)&&!result.find(r=>r.word===cl))result.push({word:cl,type:'coll',label:'搭配'});});});}
  // Deduplicate
  const seen=new Set([word]);
  return result.filter(r=>{if(seen.has(r.word))return false;seen.add(r.word);return true;}).slice(0,8);
}

function getScreeningLevel(word){
  try{const d=JSON.parse(localStorage.getItem('vocab_screening_v3')||'{}');if(!d.results)return null;const i=WORD_BANK.findIndex(w=>w.w===word);return(i>=0&&i in d.results)?d.results[i]:null;}catch(e){return null;}
}

// ============================================================
// RENDER
// ============================================================
function renderGraph(word){
  currentWordId=word;
  const wData=getWordData(word);if(!wData)return;
  const connections=getConnections(word).filter(c=>activeEdges[c.type]);
  const cx=window.innerWidth/2, cy=window.innerHeight*0.42;
  const svg=document.getElementById('graphSvg');
  const radius=Math.min(240,window.innerWidth*0.28);

  // Clear
  nodeElements.forEach(el=>el.remove());nodeElements=[];
  svg.setAttribute('viewBox',`0 0 ${window.innerWidth} ${window.innerHeight}`);

  const edgeColors={root:getComputedStyle(document.documentElement).getPropertyValue('--edge-root').trim(),syn:getComputedStyle(document.documentElement).getPropertyValue('--edge-syn').trim(),ant:getComputedStyle(document.documentElement).getPropertyValue('--edge-ant').trim(),theme:getComputedStyle(document.documentElement).getPropertyValue('--edge-theme').trim(),coll:getComputedStyle(document.documentElement).getPropertyValue('--edge-coll').trim()};

  let svgContent='';
  connections.forEach((c,i)=>{
    const angle=(i/connections.length)*2*Math.PI-Math.PI/2;
    const nx=cx+radius*Math.cos(angle), ny=cy+radius*Math.sin(angle);
    svgContent+=`<line x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}" stroke="${edgeColors[c.type]}" stroke-width="1.2" opacity="0.3"/><text x="${(cx+nx)/2}" y="${(cy+ny)/2-6}" fill="${edgeColors[c.type]}" font-size="10" text-anchor="middle" opacity="0.6" font-family="-apple-system,BlinkMacSystemFont,sans-serif">${c.label}</text>`;
    // Node
    const node=document.createElement('div');node.className='graph-node';
    node.style.left=(nx-55)+'px';node.style.top=(ny-28)+'px';
    const cw=getWordData(c.word);
    node.innerHTML=`<div class="n-word">${c.word}</div><div class="n-zh">${cw?cw.zh||'':''}</div><div class="n-edge" style="color:${edgeColors[c.type]}">${c.label}</div>`;
    node.onclick=()=>navigateTo(c.word);document.body.appendChild(node);nodeElements.push(node);
  });
  svg.innerHTML=svgContent;

  // Center
  const center=document.createElement('div');center.className='graph-center';center.id='centerNode';
  center.style.left=(cx-160)+'px';center.style.top=(cy-115)+'px';
  const level=getScreeningLevel(word);
  const lb=level==='mastered'?`<span class="c-level" style="background:rgba(48,209,88,0.12);color:var(--green);">✅ 已掌握</span>`:level==='unknown'?`<span class="c-level" style="background:rgba(255,69,58,0.12);color:var(--red);">❌ 不认识</span>`:level==='passive'?`<span class="c-level" style="background:rgba(255,159,10,0.12);color:var(--orange);">🟡 模糊</span>`:'';
  center.innerHTML=`
    <div class="c-word">${wData.w}</div>
    <div class="c-meta"><span class="c-phon">${PH[wData.w]||''}</span><span class="c-pos">${wData.pos}</span>${lb}</div>
    <div class="c-def">${wData.def}</div>
    ${wData.ex?`<div class="c-ex">${wData.ex}</div>`:''}
    ${wData.root?`<div class="c-root">🧬 ${wData.root}</div>`:''}
    <div class="rating-row">
      <button class="r-unknown${level==='unknown'?' active':''}" onclick="rateWord('unknown')">不认识</button>
      <button class="r-vague${level==='passive'?' active':''}" onclick="rateWord('passive')">模糊</button>
      <button class="r-master${level==='mastered'?' active':''}" onclick="rateWord('mastered')">掌握</button>
    </div>`;
  document.body.appendChild(center);nodeElements.push(center);
  updateTrail();
}

// ============================================================
// ACTIONS
// ============================================================
function navigateTo(word){history.push(currentWordId);if(history.length>20)history.shift();nodeElements.forEach(e=>e.remove());nodeElements=[];renderGraph(word);}
function goBack(){if(!history.length)return;const prev=history.pop();nodeElements.forEach(e=>e.remove());nodeElements=[];renderGraph(prev);}

function randomJump(){
  const weak=[];WORD_BANK.forEach(w=>{const l=getScreeningLevel(w.w);if(l==='unknown'||l==='passive')weak.push(w.w);});
  const pool=weak.length>0?weak:WORD_BANK.map(w=>w.w);
  const pick=pool[Math.floor(Math.random()*pool.length)];
  nodeElements.forEach(e=>e.remove());nodeElements=[];renderGraph(pick);
}

function resetGraph(){history=[];nodeElements.forEach(e=>e.remove());nodeElements=[];initGraph();}

function rateWord(level){
  try{
    const d=JSON.parse(localStorage.getItem('vocab_screening_v3')||'{"results":{},"answers":{},"screened":0}');
    const i=WORD_BANK.findIndex(w=>w.w===currentWordId);
    if(i<0)return;
    if(!(i in d.results))d.screened++;
    d.results[i]=level;d.answers[i]=level==='unknown'?'不认识':level==='mastered'?'掌握':'模糊';
    localStorage.setItem('vocab_screening_v3',JSON.stringify(d));
  }catch(e){}
  const old=document.getElementById('centerNode');if(old)old.remove();
  nodeElements=nodeElements.filter(e=>e.id!=='centerNode');
  renderGraph(currentWordId);
}

function updateTrail(){
  const all=[...history.slice(-8),currentWordId].filter(Boolean);
  document.getElementById('trail').innerHTML=all.map((w,i)=>`${i>0?'<span class="t-arrow">→</span>':''}<span class="t-node${i===all.length-1?' t-current':''}" onclick="jumpHistory(${i})">${w}</span>`).join('');
}

function jumpHistory(idx){
  const all=[...history.slice(-8),currentWordId].filter(Boolean);
  if(idx>=all.length)return;
  history=history.slice(0,history.length-(all.length-1-idx));
  nodeElements.forEach(e=>e.remove());nodeElements=[];renderGraph(all[idx]);
}

function toggleEdges(){
  document.querySelectorAll('#edgeLegend input').forEach(cb=>{activeEdges[cb.dataset.type]=cb.checked;});
  nodeElements.forEach(e=>e.remove());nodeElements=[];renderGraph(currentWordId);
}

// ============================================================
// INIT
// ============================================================
function initGraph(){
  let start=WORD_BANK[0].w;
  try{
    const d=JSON.parse(localStorage.getItem('vocab_screening_v3')||'{}');
    if(d.results){
      const unk=[],pass=[];
      Object.entries(d.results).forEach(([k,v])=>{
        const i=parseInt(k);
        if(i<WORD_BANK.length){if(v==='unknown')unk.push(i);else if(v==='passive')pass.push(i);}
      });
      const pool=unk.length>0?unk:pass;
      if(pool.length)start=WORD_BANK[pool[Math.floor(Math.random()*pool.length)]].w;
    }
  }catch(e){}
  renderGraph(start);
}

window.addEventListener('resize',()=>{if(currentWordId){nodeElements.forEach(e=>e.remove());nodeElements=[];renderGraph(currentWordId);}});
initGraph();
</script>
</body>
</html>
