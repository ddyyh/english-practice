<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Word Graph</title>
<style>
:root{--bg:#1a1a1c;--panel:#242426;--text:#f5f5f7;--text2:#aeaeb2;--text3:#636366;--accent:#0a84ff;--green:#30d158;--orange:#ff9f0a;--red:#ff453a;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100dvh;width:100vw;-webkit-font-smoothing:antialiased;user-select:none;-webkit-user-select:none}
canvas{position:fixed;top:0;left:0;z-index:1}
.top-bar{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;gap:12px;background:rgba(26,26,28,0.75);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.top-bar h1{font-size:0.95rem;font-weight:700;letter-spacing:-0.3px}
.top-bar .btn-group{display:flex;gap:6px;flex-wrap:wrap}
.top-bar button{background:rgba(255,255,255,0.07);border:none;color:var(--text2);padding:6px 13px;border-radius:100px;font-size:0.73rem;font-weight:500;cursor:pointer;font-family:inherit;transition:all 0.2s}
.top-bar button:hover{background:rgba(255,255,255,0.13);color:var(--text)}
.tooltip{position:fixed;z-index:5;pointer-events:none;opacity:0;transition:opacity 0.15s;background:rgba(36,36,38,0.95);padding:8px 14px;border-radius:12px;font-size:0.78rem;max-width:200px;box-shadow:0 4px 24px rgba(0,0,0,0.5)}
.tooltip .tw{font-weight:700;color:#fff}.tooltip .tp{color:var(--text2);font-size:0.7rem;margin-left:6px}.tooltip .td{color:var(--text2);font-size:0.7rem;margin-top:2px;line-height:1.3}
.panel{position:fixed;right:-380px;top:0;bottom:0;width:360px;z-index:20;background:var(--panel);border-left:0.5px solid rgba(255,255,255,0.06);padding:24px 22px;overflow-y:auto;transition:right 0.35s cubic-bezier(0.25,0.1,0.25,1);box-shadow:-4px 0 40px rgba(0,0,0,0.5)}
.panel.open{right:0}
.panel .close{position:absolute;top:16px;right:16px;width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.06);border:none;color:var(--text2);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.panel .pw{font-size:1.8rem;font-weight:800;letter-spacing:-0.5px;margin-bottom:4px}
.panel .pm{display:flex;gap:8px;align-items:center;margin:8px 0;flex-wrap:wrap}
.panel .pp{color:var(--text2);font-size:0.82rem}
.panel .po{background:rgba(10,132,255,0.12);color:var(--accent);padding:3px 10px;border-radius:100px;font-size:0.7rem}
.panel .pd{color:var(--text2);font-size:0.9rem;line-height:1.5;margin:12px 0}
.panel .pe{background:rgba(255,255,255,0.03);border-left:2.5px solid var(--accent);padding:10px 14px;border-radius:0 10px 10px 0;font-size:0.82rem;color:var(--text);font-style:italic;line-height:1.5;margin:12px 0}
.panel .pr{font-size:0.75rem;color:var(--text3);margin:8px 0;line-height:1.4}
.panel .prel{margin-top:16px}.panel .prel h4{font-size:0.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.panel .prel span{display:inline-block;padding:4px 10px;border-radius:100px;font-size:0.72rem;margin:3px 4px 3px 0;cursor:pointer;transition:all 0.15s;background:rgba(255,255,255,0.04);color:var(--text2)}
.panel .prel span:hover{background:rgba(255,255,255,0.1);color:#fff}
.panel .ratings{display:flex;gap:8px;margin-top:16px}
.panel .ratings button{flex:1;padding:8px 4px;border-radius:100px;border:none;background:rgba(255,255,255,0.04);color:var(--text2);font-size:0.72rem;cursor:pointer;font-family:inherit;transition:all 0.2s}
.legend{position:fixed;right:12px;top:90px;z-index:8;display:flex;flex-direction:column;gap:5px;background:rgba(36,36,38,0.7);padding:10px 12px;border-radius:10px}
.legend label{font-size:0.65rem;display:flex;align-items:center;gap:6px;cursor:pointer;color:var(--text3);font-weight:500}
.legend .dot{width:7px;height:7px;border-radius:50%}
@media(max-width:640px){.panel{width:100vw;right:-100vw}.top-bar{padding:8px 10px}.top-bar h1{font-size:0.8rem}.top-bar button{padding:5px 10px;font-size:0.68rem}.legend{right:4px;padding:6px 8px}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="top-bar"><h1>🕸️ Word Graph · 500词</h1><div class="btn-group"><button onclick="resetView()">🔍 全局</button><button onclick="jumpWeakest()">🎯 薄弱词</button><button onclick="jumpRandom()">⚡ 随机</button><button style="opacity:0.7" onclick="window.open('screening.html','_blank')">筛词</button><button style="opacity:0.7" onclick="window.open('flashcards.html','_blank')">造句</button></div></div>
<div class="tooltip" id="tt"></div>
<div class="panel" id="panel"><button class="close" onclick="document.getElementById('panel').classList.remove('open')">✕</button><div id="pcontent"></div></div>
<div class="legend"><div style="font-size:0.6rem;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px;">连线颜色</div><label title="共享同一拉丁/希腊词根的词，如 expect→inspect→respect（都来自 -spect- 看）"><input type="checkbox" checked onchange="tgl('root')"><span class="dot" style="background:#30d158"></span>同根词族</label><label title="意思相近可以互换的词"><input type="checkbox" checked onchange="tgl('syn')"><span class="dot" style="background:#0a84ff"></span>近义词</label><label title="意思相反的词"><input type="checkbox" checked onchange="tgl('ant')"><span class="dot" style="background:#ff453a"></span>反义词</label><label title="属于同一使用场景的词，如 deadline、budget、schedule 都是工作场景"><input type="checkbox" onchange="tgl('theme')"><span class="dot" style="background:#ff9f0a"></span>同场景</label><label title="经常一起出现的搭配词，如 meet + deadline"><input type="checkbox" checked onchange="tgl('coll')"><span class="dot" style="background:#aeaeb2"></span>常见搭配</label></div>
<div class="legend" style="top:240px;"><div style="font-size:0.6rem;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px;">单词颜色</div><label><span class="dot" style="background:#ff453a;opacity:0.65"></span>不认识</label><label><span class="dot" style="background:#ff9f0a;opacity:0.65"></span>模糊</label><label><span class="dot" style="background:#aeaeb2;opacity:0.45"></span>未标记</label><label><span class="dot" style="background:rgba(72,72,74,0.55)"></span>已掌握</label></div>
<div id="status" style="position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:10;background:rgba(36,36,38,0.85);padding:6px 16px;border-radius:100px;font-size:0.72rem;color:var(--text3);pointer-events:none;transition:all 0.3s;">🌐 全局视图 · 500词 · 单击词进入聚焦 | 双击词看详情 | 滚轮缩放</div>

<script src="wordbank.js"></script>
<script src="word-families.js"></script>
<script>
// ── EDGE TYPES ──
const ET={root:{c:'#30d158',on:true},syn:{c:'#0a84ff',on:true},ant:{c:'#ff453a',on:true},theme:{c:'#ff9f0a',on:false},coll:{c:'#aeaeb2',on:true}};
function tgl(t){ET[t].on=!ET[t].on;render();}

// ── ANTONYMS ──
const ANT={accept:'refuse',refuse:'accept',increase:'decrease',decrease:'increase',temporary:'permanent',permanent:'temporary',positive:'negative',negative:'positive',generous:'selfish',selfish:'generous',external:'internal',internal:'external',majority:'minority',minority:'majority',advantage:'disadvantage',disadvantage:'advantage',guilty:'innocent',innocent:'guilty',formal:'casual',casual:'formal'};

// ── THEMES ──
const TM={Work:'schedule,deadline,budget,colleague,presentation,interview,promote,negotiate,manage,achieve,goal,strategy,perform,contribute,cooperate,feedback,compromise,responsibility,appointment,customer,policy,procedure,application,department,contract,agreement'.split(','),Emotions:'disappointed,grateful,proud,jealous,guilty,anxious,nervous,relieved,confident,confused,annoyed,embarrassed,curious,brave,patient,generous,selfish,honest,eager,reluctant,calm,sensitive,tough,desperate,enthusiastic,innocent,regret,suffer,comfort,praise'.split(','),Communication:'conversation,dialogue,argument,debate,negotiate,persuade,suggest,mention,describe,explain,express,declare,emphasize,summarize,request,complain,apologize,respond,interrupt,criticize,warn,promise,insist,advocate,acknowledge,inform,indicate,interpret'.split(','),Tech:'access,device,network,data,platform,application,install,develop,design,create,digital,software,internet,connect,efficient,transform,research,analysis,solution,capture,display,signal,generate,implement,program,automate,artificial'.split(','),Daily:'habit,routine,comfort,convenient,waste,bother,manage,handle,deal,struggle,survive,balance,afford,prefer,prepare,organize,arrange,cancel,decide,choose,option,opportunity,risk,effort,attention,progress,improve,reduce,adjust,adapt'.split(','),Learning:'research,analysis,definition,concept,principle,theory,evidence,prove,demonstrate,examine,evaluate,assess,determine,identify,recognize,realize,discover,explore,conclude,summarize,illustrate,define,describe,compare,contrast,calculate,measure,concentrate,focus,understand'.split(','),Change:'increase,decrease,improve,reduce,develop,transform,evolve,adapt,adjust,progress,decline,expand,extend,eliminate,replace,reform,convert,grow,rise,fall,emerge,disappear,create,destroy,establish,abandon'.split(','),Society:'culture,tradition,community,population,economy,government,policy,election,justice,rights,responsibility,freedom,conflict,protest,reform,education,environment,resource,majority,minority,individual,society,global,local,public,private'.split(',')};
const WT={};Object.entries(TM).forEach(([t,ws])=>{ws.forEach(w=>{if(!WT[w])WT[w]=[];WT[w].push(t);});});

// ── NODES ──
const NODES=[],NM={};
WORD_BANK_W.forEach((w,i)=>{
  const n={id:i,word:w.w,zh:WORDS_500[i]?.zh||'',phon:PH[w.w]||'',def:w.def,ex:w.ex,pos:w.pos,root:w.root||'',x:0,y:0,vx:0,vy:0,r:0,conn:[],m:null};
  NODES.push(n);NM[w.w]=n;
});
const NN=NODES.length;

// Load screening
try{const d=JSON.parse(localStorage.getItem('vocab_screening_v3')||'{}');if(d.results)Object.entries(d.results).forEach(([k,v])=>{const i=parseInt(k);if(i<NN)NODES[i].m=v;});}catch(e){}

// ── BUILD CONNECTIONS ──
function ae(a,b,type,label){if(a===b)return;if(a.conn.find(c=>c.n===b&&c.t===type))return;a.conn.push({n:b,t:type,l:label});}
NODES.forEach(n=>{
  const w=n.word,wd=WORD_BANK_W[n.id];
  // Root
  const f=findRootFamily(w);
  if(f)Object.keys(f.words).forEach(rw=>{if(rw!==w&&NM[rw])ae(n,NM[rw],'root',f.root.split('=')[0].trim());});
  // Syn
  if(wd&&wd.syn)wd.syn.split(/[,，]/).forEach(s=>{const sw=s.trim();if(sw&&sw!==w&&NM[sw])ae(n,NM[sw],'syn','近义');});
  // Ant
  if(ANT[w]&&NM[ANT[w]])ae(n,NM[ANT[w]],'ant','反义');
  // Theme
  if(WT[w])WT[w].forEach(t=>{TM[t].forEach(tw=>{if(tw!==w&&NM[tw]&&n.conn.filter(c=>c.t==='theme').length<2)ae(n,NM[tw],'theme',t);});});
  // Coll
  if(wd&&wd.coll)wd.coll.split('/').forEach(p=>{p.trim().split(/\s+/).filter(x=>x.length>3&&!/^(the|and|or|to|in|on|at|for|of|with|by|that|not|from)$/i.test(x)).forEach(cw=>{const cl=cw.replace(/[(),….;:]/g,'');if(cl!==w&&NM[cl])ae(n,NM[cl],'coll','搭配');});});
});
NODES.forEach(n=>{n.r=6+Math.min(14,n.conn.length*1.5);});

// ── FORCE LAYOUT ──
(function force(iter){
  const WW=2800,HH=2800,cx=WW/2,cy=HH/2;
  NODES.forEach(n=>{n.x=cx+(Math.random()-0.5)*800;n.y=cy+(Math.random()-0.5)*800;n.vx=0;n.vy=0;});
  for(let t=0;t<iter;t++){
    const tmp=Math.max(0.1,1-t/iter);
    // Repulsion
    for(let i=0;i<NN;i++)for(let j=i+1;j<NN;j++){
      const dx=NODES[j].x-NODES[i].x,dy=NODES[j].y-NODES[i].y,dist=Math.max(1,Math.sqrt(dx*dx+dy*dy));
      const f=200*tmp/Math.max(dist,10),fx=dx/dist*f,fy=dy/dist*f;
      NODES[i].vx-=fx;NODES[i].vy-=fy;NODES[j].vx+=fx;NODES[j].vy+=fy;
    }
    // Attraction
    NODES.forEach(n=>{n.conn.forEach(c=>{
      const dx=c.n.x-n.x,dy=c.n.y-n.y,dist=Math.sqrt(dx*dx+dy*dy),td=60+n.r+c.n.r;
      if(dist>td){const f=(dist-td)*0.01*tmp;n.vx+=dx/dist*f;n.vy+=dy/dist*f;c.n.vx-=dx/dist*f;c.n.vy-=dy/dist*f;}
    });});
    // Gravity
    NODES.forEach(n=>{n.vx+=(cx-n.x)*0.001*tmp;n.vy+=(cy-n.y)*0.001*tmp;n.vx*=0.85;n.vy*=0.85;n.x+=n.vx;n.y+=n.vy;});
  }
})(200);

// ── CANVAS ──
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let vx=0,vy=0,zm=0.28,hover=null,drag=null,pan=false,psx=0,psy=0,pvx=0,pvy=0,sub=null,visible=NODES;

function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight;render();}
resize();window.addEventListener('resize',resize);

function wp(n){return{x:n.x*zm+vx,y:n.y*zm+vy};}
function fn(sx,sy){const wx=(sx-vx)/zm,wy=(sy-vy)/zm;for(let i=visible.length-1;i>=0;i--){const n=visible[i],dx=n.x-wx,dy=n.y-wy;if(Math.sqrt(dx*dx+dy*dy)<n.r+20/zm)return n;}return null;}

function updateVisible(){
  if(!sub){visible=NODES;return;}
  const s=new Set([sub.id]);
  const q=[sub];
  while(q.length){const n=q.shift();n.conn.forEach(c=>{if(!s.has(c.n.id)&&ET[c.t]&&ET[c.t].on){s.add(c.n.id);c.n.conn.forEach(c2=>{if(!s.has(c2.n.id)&&ET[c2.t]&&ET[c2.t].on)s.add(c2.n.id);});}});}
  visible=NODES.filter(n=>s.has(n.id));
}
updateVisible();

function nc(n){if(n.m==='mastered')return'rgba(72,72,74,0.55)';if(n.m==='unknown')return'rgba(255,69,58,0.65)';if(n.m==='passive')return'rgba(255,159,10,0.65)';return'rgba(174,174,178,0.45)';}

function render(){
  ctx.clearRect(0,0,cv.width,cv.height);
  const vs=new Set(visible.map(n=>n.id));
  // Edges
  visible.forEach(n=>{n.conn.forEach(c=>{if(!vs.has(c.n.id)||c.n.id<n.id)return;const e=ET[c.t];if(!e||!e.on)return;const p1=wp(n),p2=wp(c.n),hl=(hover===n||hover===c.n);ctx.strokeStyle=e.c;ctx.globalAlpha=hl?0.55:0.1;ctx.lineWidth=hl?1.5:0.5;ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();ctx.globalAlpha=1;});});
  // Nodes
  visible.forEach(n=>{const p=wp(n),r=Math.max(sub?8:4.5,n.r*zm*(sub?2.5:1.3)),hl=(hover===n);ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.fillStyle=hl?(n.m==='mastered'?'#78787a':n.m==='unknown'?'#ff453a':n.m==='passive'?'#ff9f0a':'#fff'):nc(n);ctx.fill();if(hl||r>4){ctx.strokeStyle=hl?'#fff':'rgba(255,255,255,0.12)';ctx.lineWidth=hl?2:0.5;ctx.stroke();}if(zm>0.15||hl){ctx.fillStyle=hl?'#fff':n.m==='mastered'?'rgba(255,255,255,0.2)':'rgba(255,255,255,0.5)';ctx.font=sub?26:14+'px -apple-system,sans-serif';ctx.textAlign='center';ctx.fillText(n.word,p.x,p.y+r+(sub?18:12));}});
}

// ── INTERACTION ──
cv.addEventListener('mousemove',e=>{
  if(drag){const wx=(e.clientX-vx)/zm,wy=(e.clientY-vy)/zm;drag.x=wx-drag._ox;drag.y=wy-drag._oy;render();return;}
  if(pan){vx=e.clientX-psx+pvx;vy=e.clientY-psy+pvy;render();return;}
  const was=hover;hover=fn(e.clientX,e.clientY);
  if(hover!==was)render();
  const tt=document.getElementById('tt');
  if(hover){tt.style.opacity='1';tt.style.left=(e.clientX+16)+'px';tt.style.top=(e.clientY-16)+'px';tt.innerHTML='<div class="tw">'+hover.word+'</div><div class="tp">'+hover.phon+' '+hover.pos+'</div><div class="td">'+hover.def.slice(0,60)+'…</div>';}
  else tt.style.opacity='0';
});
cv.addEventListener('mousedown',e=>{
  const n=fn(e.clientX,e.clientY);
  if(n){if(e.shiftKey){drag=n;const w=(e.clientX-vx)/zm,wy=(e.clientY-vy)/zm;drag._ox=w-n.x;drag._oy=wy-n.y;}return;}
  pan=true;psx=e.clientX;psy=e.clientY;pvx=vx;pvy=vy;
});
cv.addEventListener('mouseup',()=>{drag=null;pan=false;});
cv.addEventListener('mouseleave',()=>{drag=null;pan=false;hover=null;render();document.getElementById('tt').style.opacity='0';});
cv.addEventListener('wheel',e=>{e.preventDefault();const mx=e.clientX,my=e.clientY,zf=e.deltaY<0?1.1:0.9;vx=mx-(mx-vx)*zf;vy=my-(my-vy)*zf;zm=Math.max(0.1,Math.min(1.8,zm*zf));render();},{passive:false});
cv.addEventListener('click',()=>{
  if(!drag&&hover){
    const op=document.getElementById('ratingPopover');if(op)op.remove();const ip=document.getElementById('infoPopover');if(ip)ip.remove();
    sub=hover;updateVisible();zm=0.55;
    vx=cv.width/2-hover.x*zm;vy=cv.height/2-hover.y*zm;
    document.getElementById('status').innerHTML='🎯 聚焦: <b style=color:#fff>'+hover.word+'</b> · 仅显示关联词 · 双击空白返回全局';
    showRatingPopover(hover);render();
  }
});
cv.addEventListener('dblclick',e=>{const n=fn(e.clientX,e.clientY);if(n){openDetail(n);}else{sub=null;updateVisible();resetView();render();document.getElementById('status').innerHTML='🌐 全局视图 · 500词 · 单击词进入聚焦 | 双击词看详情 | 滚轮缩放';}});
cv.addEventListener('contextmenu',e=>{e.preventDefault();});
// Touch support for mobile
let _pd=0,_pz=0;
cv.addEventListener('touchstart',e=>{e.preventDefault();if(e.touches.length===1){const t=e.touches[0];const n=fn(t.clientX,t.clientY);if(n){sub=n;updateVisible();zm=0.55;vx=cv.width/2-n.x*zm;vy=cv.height/2-n.y*zm;document.getElementById('status').innerHTML='🎯 聚焦: <b style=color:#fff>'+n.word+'</b> · 双击空白返回全局';render();document.getElementById('panel').classList.remove('open');}else{psx=t.clientX;psy=t.clientY;pvx=vx;pvy=vy;pan=true;}}else if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;_pd=Math.sqrt(dx*dx+dy*dy);_pz=zm;}},{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault();if(pan&&e.touches.length===1){const t=e.touches[0];vx=t.clientX-psx+pvx;vy=t.clientY-psy+pvy;render();}else if(e.touches.length===2&&_pd>0){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;const nd=Math.sqrt(dx*dx+dy*dy);const nz=_pz*(nd/_pd);const mx=(e.touches[0].clientX+e.touches[1].clientX)/2,my=(e.touches[0].clientY+e.touches[1].clientY)/2;vx=mx-(mx-vx)*(nz/zm);vy=my-(my-vy)*(nz/zm);zm=Math.max(0.1,Math.min(1.8,nz));render();}},{passive:false});
cv.addEventListener('touchend',()=>{pan=false;_pd=0;drag=null;});



// ── RATING POPOVER (floating bubbles near node) ──
function showRatingPopover(n){
  var old=document.getElementById("ratingPopover");if(old)old.remove();
  var div=document.createElement("div");div.id="ratingPopover";
  div.style.cssText="position:fixed;z-index:25;left:50%;transform:translateX(-50%);bottom:100px;background:rgba(36,36,38,0.95);backdrop-filter:blur(12px);padding:10px 12px;border-radius:16px;display:flex;gap:8px;box-shadow:0 4px 32px rgba(0,0,0,0.6);transition:all 0.25s ease;";
  [
    {t:"😰 不认识",s:"background:rgba(255,69,58,0.2);color:#ff453a",l:"unknown"},
    {t:"🤔 模糊",s:"background:rgba(255,159,10,0.2);color:#ff9f0a",l:"passive"},
    {t:"😎 掌握",s:"background:rgba(48,209,88,0.2);color:#30d158",l:"mastered"}
  ].forEach(function(b){
    var btn=document.createElement("button");
    btn.textContent=b.t;btn.style.cssText="padding:10px 18px;border-radius:100px;border:none;font-size:0.85rem;cursor:pointer;font-family:inherit;white-space:nowrap;"+b.s;
    btn.onclick=function(){markNodePop(n.id,b.l);};
    div.appendChild(btn);
  });
  document.body.appendChild(div);
  showInfoCard(n);
}
function markNodePop(id,level){
  NODES[id].m=level;
  try{const d=JSON.parse(localStorage.getItem('vocab_screening_v3')||'{"results":{},"answers":{},"screened":0}');if(!(id in d.results))d.screened++;d.results[id]=level;localStorage.setItem('vocab_screening_v3',JSON.stringify(d));}catch(e){}
  render();
  const pop=document.getElementById('ratingPopover');if(pop)pop.remove();const ip=document.getElementById('infoPopover');if(ip)ip.remove();
  // Re-show with updated state if still focused
  if(sub&&sub.id===id)showRatingPopover(NODES[id]);
}


// ── INFO CARD (root/affix in focus mode) ──
function showInfoCard(n){
  var old=document.getElementById("infoPopover");if(old)old.remove();
  var family=findRootFamily(n.word);if(!family)return;
  var relatives=Object.entries(family.words).filter(function(e){return e[0]!==n.word&&NM[e[0]];});
  if(!relatives.length)return;
  var card=document.createElement("div");card.id="infoPopover";
  card.style.cssText="position:fixed;z-index:15;left:12px;top:50%;transform:translateY(-50%);background:rgba(36,36,38,0.95);backdrop-filter:blur(12px);padding:14px 16px;border-radius:16px;max-width:270px;box-shadow:0 4px 32px rgba(0,0,0,0.5);font-size:0.78rem;color:var(--text2);line-height:1.6;";
  var parts=[];
  parts.push("<div style='font-size:0.7rem;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px'>🧬 词根家族: "+family.root+"</div>");
  parts.push("<div style='color:#fff;font-weight:700;margin-bottom:8px'>▶ "+n.word+" ← 当前词</div>");
  relatives.forEach(function(e){
    parts.push("<div style='padding:3px 0;font-size:0.73rem'><span style='color:#fff'>"+e[0]+"</span> <span style='color:var(--accent);font-size:0.65rem'>"+e[1].prefix+"</span> <span style='color:var(--text3);font-size:0.65rem'>"+e[1].hint+"</span></div>");
  });
  card.innerHTML=parts.join("");
  document.body.appendChild(card);
}

// ── DETAIL PANEL ──
function openDetail(n){
  const l=n.m;
  document.getElementById('pcontent').innerHTML=
    '<div class="pw">'+n.word+'</div><div style="font-size:1.1rem;color:#fff;margin:4px 0;">'+n.zh+'</div><div class="pm"><span class="pp">'+n.phon+'</span><span class="po">'+n.pos+'</span></div><a href="flashcards.html" target="_blank" style="font-size:0.7rem;color:var(--accent);text-decoration:none;display:inline-block;margin:4px 0;">✏️ 在闪卡中练习 →</a>'+
    '<div class="pd">'+n.def+'</div>'+(n.ex?'<div class="pe">'+n.ex+'</div>':'')+
    (n.root?'<div class="pr">🧬 '+n.root+'</div>':'')+
    '<div class="prel"><h4>关联词 ('+n.conn.length+')</h4>'+n.conn.slice(0,12).map(c=>'<span onclick="goNode('+c.n.id+')">'+c.n.word+'</span>').join('')+'</div>'+
    '<div class="ratings"><button style="'+(l==='unknown'?'background:rgba(255,69,58,0.2);color:#ff453a':'')+'" onclick="mark('+n.id+',\'unknown\')">不认识</button><button style="'+(l==='passive'?'background:rgba(255,159,10,0.2);color:#ff9f0a':'')+'" onclick="mark('+n.id+',\'passive\')">模糊</button><button style="'+(l==='mastered'?'background:rgba(48,209,88,0.2);color:#30d158':'')+'" onclick="mark('+n.id+',\'mastered\')">掌握</button></div>';
  document.getElementById('panel').classList.add('open');
}
function goNode(id){
  const n=NODES[id];sub=n;updateVisible();vx=cv.width/2-n.x*zm;vy=cv.height/2-n.y*zm;openDetail(n);render();
}
function mark(id,level){
  NODES[id].m=level;
  try{const d=JSON.parse(localStorage.getItem('vocab_screening_v3')||'{"results":{},"answers":{},"screened":0}');if(!(id in d.results))d.screened++;d.results[id]=level;localStorage.setItem('vocab_screening_v3',JSON.stringify(d));}catch(e){}
  openDetail(NODES[id]);render();
}

// ── CONTROLS ──
function resetView(){const p=document.getElementById('ratingPopover');if(p)p.remove();const ip=document.getElementById('infoPopover');if(ip)ip.remove();sub=null;updateVisible();vx=cv.width/2-1400*zm;vy=cv.height/2-1400*zm;zm=0.28;render();document.getElementById('status').innerHTML='🌐 全局视图 · 500词 · 单击词进入聚焦 | 双击词看详情 | 滚轮缩放';}
function jumpWeakest(){
  const unk=NODES.filter(n=>n.m==='unknown'),pass=NODES.filter(n=>n.m==='passive');
  const pool=unk.length>0?unk:pass.length>0?pass:NODES;
  const n=pool[Math.floor(Math.random()*pool.length)];
  sub=n;updateVisible();zm=0.55;vx=cv.width/2-n.x*zm;vy=cv.height/2-n.y*zm;
  document.getElementById('status').innerHTML='🎯 聚焦: <b style=color:#fff>'+n.word+'</b> · 你标记为<font color='+(n.m==='unknown'?'#ff453a':'#ff9f0a')+'>'+(n.m==='unknown'?'不认识':'模糊')+'</font> · 双击空白返回全局';
  render();
}
function jumpRandom(){
  const pool=NODES.filter(n=>n.m!=='mastered');
  const n=(pool.length>0?pool:NODES)[Math.floor(Math.random()*(pool.length>0?pool:NODES).length)];
  sub=n;updateVisible();vx=cv.width/2-n.x*zm;vy=cv.height/2-n.y*zm;render();
}

// ── START ──
render();
setTimeout(jumpWeakest,400);

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){sub=null;updateVisible();resetView();render();document.getElementById('panel').classList.remove('open');const ip2=document.getElementById('infoPopover');if(ip2)ip2.remove();document.getElementById('status').innerHTML='🌐 全局视图 · 500词 · 单击词进入聚焦 | 双击词看详情 | 滚轮缩放';}
  if(e.key==='f')jumpWeakest();
  if(e.key==='r')jumpRandom();
});
</script>
</body>
</html>
