<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B1 词汇活化闪卡 - English Vocabulary Activation</title>
<style>
  :root {
    --bg: #1a1a2e;
    --card-bg: #16213e;
    --text: #e0e0e0;
    --accent: #4fc3f7;
    --success: #66bb6a;
    --warning: #ffa726;
    --danger: #ef5350;
    --muted: #888;
    --border: #2a2a4a;
    --input-bg: #1e1e36;
    --highlight: rgba(79,195,247,0.1);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  .container { width: 100%; max-width: 660px; display: flex; flex-direction: column; gap: 16px; }

  .header { text-align: center; }
  .header h1 { font-size: 1.6rem; color: var(--accent); margin-bottom: 2px; }
  .header .subtitle { font-size: 0.85rem; color: var(--muted); }

  .stats-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .stat-item { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 8px 14px; text-align: center; min-width: 65px; }
  .stat-item .stat-num { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
  .stat-item .stat-label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; }
  .stat-item.streak .stat-num { color: var(--warning); }
  .stat-item.mastered .stat-num { color: var(--success); }

  .progress-wrap { background: var(--card-bg); border-radius: 8px; height: 5px; overflow: hidden; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--success)); border-radius: 8px; transition: width 0.4s ease; }

  .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 28px 24px; display: flex; flex-direction: column; align-items: center; gap: 16px; transition: all 0.3s ease; animation: fadeIn 0.35s ease; }
  .card.flipped { border-color: var(--accent); }
  .card-number { font-size: 0.78rem; color: var(--muted); letter-spacing: 2px; }
  .card-word { font-size: 2rem; font-weight: 700; color: #fff; letter-spacing: 1px; text-align: center; }
  .card-definition { font-size: 1rem; color: #bbb; text-align: center; line-height: 1.5; max-width: 450px; }
  .pos-tag { display: inline-block; background: rgba(79,195,247,0.15); color: var(--accent); padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; margin-bottom: 8px; }
  .category-badge { display: inline-block; font-size: 0.7rem; padding: 4px 10px; border-radius: 20px; background: rgba(255,255,255,0.06); color: var(--muted); letter-spacing: 1px; }

  /* ── Result / Deep Dive ── */
  .result-section { width: 100%; display: flex; flex-direction: column; gap: 14px; }
  .sentence-box { padding: 12px 16px; border-radius: 8px; font-size: 0.9rem; line-height: 1.5; }
  .sentence-box.user { background: rgba(255,167,38,0.08); border-left: 3px solid var(--warning); color: #ddd; }
  .sentence-box.model { background: rgba(102,187,106,0.08); border-left: 3px solid var(--success); color: #ddd; font-style: italic; }
  .sentence-box .s-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; display: block; }
  .sentence-box.user .s-label { color: var(--warning); }
  .sentence-box.model .s-label { color: var(--success); }

  /* Tabs */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); width: 100%; }
  .tab-btn { flex:1; padding: 8px 4px; background: none; border: none; color: var(--muted); font-size: 0.8rem; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; font-family: inherit; }
  .tab-btn:hover { color: #ccc; }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-panel { display: none; width: 100%; padding: 12px 0; flex-direction: column; gap: 10px; }
  .tab-panel.active { display: flex; }

  /* Word Detail */
  .detail-item { background: var(--input-bg); border-radius: 8px; padding: 10px 14px; }
  .detail-item .d-label { font-size: 0.7rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; font-weight: 600; }
  .detail-item .d-content { font-size: 0.88rem; color: #ccc; line-height: 1.5; }
  .detail-item .d-content em { color: var(--accent); font-style: normal; font-weight: 600; }
  .highlight-word { color: var(--accent); font-weight: 600; }

  /* AI Check Button */
  .ai-check-box { width: 100%; background: linear-gradient(135deg, rgba(102,187,106,0.1), rgba(79,195,247,0.1)); border: 1px solid rgba(102,187,106,0.25); border-radius: 10px; padding: 14px; text-align: center; }
  .ai-check-box .ai-hint { font-size: 0.82rem; color: #aaa; margin-bottom: 8px; }
  .btn-ai { background: linear-gradient(135deg, var(--success), #43a047); color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: inherit; }
  .btn-ai:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-ai.copied { background: var(--muted); }

  /* Input */
  .input-area { width: 100%; display: flex; flex-direction: column; gap: 8px; }
  .input-area textarea { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--input-bg); color: var(--text); font-size: 1rem; font-family: inherit; resize: none; min-height: 80px; transition: border-color 0.2s; }
  .input-area textarea:focus { outline: none; border-color: var(--accent); }
  .input-area .hint { font-size: 0.75rem; color: var(--muted); text-align: center; }

  /* Buttons */
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; width: 100%; }
  .btn { padding: 9px 20px; border-radius: 8px; border: none; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: inherit; }
  .btn:active { transform: scale(0.96); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: #1a1a2e; }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
  .btn-outline:hover { background: rgba(79,195,247,0.1); }
  .btn-success { background: var(--success); color: #1a1a2e; }
  .btn-warning { background: var(--warning); color: #1a1a2e; }
  .btn-small { padding: 6px 14px; font-size: 0.78rem; border-radius: 6px; }

  /* Completion */
  .completion { text-align: center; padding: 16px; }
  .completion .emoji { font-size: 2.8rem; margin-bottom: 10px; }
  .completion h2 { color: var(--success); margin-bottom: 6px; }
  .completion .summary { color: var(--muted); line-height: 1.6; }

  .thinking { animation: pulse 1.5s infinite; }
  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--success); color: #1a1a2e; padding: 10px 24px; border-radius: 20px; font-weight: 600; font-size: 0.9rem; z-index: 100; animation: fadeIn 0.3s ease; pointer-events: none; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%,100% {opacity:1;} 50% {opacity:0.5;} }

  @media (max-width: 480px) { .card { padding: 20px 14px; } .card-word { font-size: 1.6rem; } .btn { padding: 7px 14px; font-size: 0.82rem; } }

  /* Settings & AI */
  .settings-btn { position:fixed; top:16px; right:20px; width:36px; height:36px; border-radius:50%; background:var(--card-bg); border:1px solid var(--border); color:var(--muted); font-size:1.1rem; cursor:pointer; z-index:50; transition:all 0.2s; display:flex; align-items:center; justify-content:center; }
  .settings-btn:hover { color:var(--accent); border-color:var(--accent); }
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:100; justify-content:center; align-items:center; }
  .modal-overlay.show { display:flex; }
  .modal { background:var(--card-bg); border:1px solid var(--border); border-radius:16px; padding:24px; width:90%; max-width:420px; display:flex; flex-direction:column; gap:14px; }
  .modal h3 { color:var(--accent); font-size:1.1rem; }
  .modal input { width:100%; padding:10px 14px; border-radius:8px; border:1px solid var(--border); background:var(--input-bg); color:var(--text); font-size:0.9rem; font-family:monospace; outline:none; }
  .modal input:focus { border-color:var(--accent); }
  .modal .hint { font-size:0.72rem; color:var(--muted); line-height:1.5; }

  .ai-feedback { width:100%; background:rgba(79,195,247,0.05); border:1px solid rgba(79,195,247,0.2); border-radius:10px; padding:14px; font-size:0.85rem; line-height:1.6; color:#ccc; display:none; }
  .ai-feedback.show { display:block; animation:fadeIn 0.3s ease; }
  .ai-feedback .ai-label { font-size:0.7rem; color:var(--accent); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
  .ai-feedback.loading { color:var(--muted); }
  .btn-ai-check { background:linear-gradient(135deg, var(--accent), #29b6f6); color:#1a1a2e; border:none; padding:8px 16px; border-radius:8px; font-size:0.82rem; font-weight:600; cursor:pointer; transition:all 0.2s; font-family:inherit; }
  .btn-ai-check:hover { filter:brightness(1.1); }
  .btn-ai-check:disabled { opacity:0.5; cursor:wait; }

  /* Word Family Graph */
  .word-family{width:100%;background:var(--input-bg);border-radius:10px;padding:14px;border:1px solid var(--border);margin-top:4px;}
  .wf-title{font-size:0.8rem;color:var(--accent);font-weight:700;margin-bottom:10px;letter-spacing:0.5px;}
  .wf-tree{display:flex;flex-direction:column;gap:4px;position:relative;padding-left:16px;border-left:2px solid rgba(79,195,247,0.2);}
  .wf-node{display:flex;align-items:baseline;gap:6px;padding:5px 8px;border-radius:6px;font-size:0.8rem;transition:all 0.15s;flex-wrap:wrap;}
  .wf-node:hover{background:rgba(79,195,247,0.08);}
  .wf-node.current{background:rgba(102,187,106,0.1);border:1px solid rgba(102,187,106,0.2);}
  .wf-word{font-weight:700;color:#fff;min-width:70px;}
  .wf-prefix{color:var(--accent);font-size:0.72rem;font-family:monospace;}
  .wf-hint{color:var(--muted);font-size:0.75rem;}
</style>
</head>
<body>
<button class="settings-btn" onclick="openSettings()" title="设置 API Key">⚙</button>
<div id="modalOverlay" class="modal-overlay">
  <div class="modal">
    <h3>⚙ DeepSeek API 设置</h3>
    <div class="hint">输入你的 DeepSeek API Key，即可在造句后一键获得 AI 批改。<br>Key 只保存在你的浏览器本地。</div>
    <input type="password" id="apiKeyInput" placeholder="sk-xxxxxxxxxxxxxxxx">
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button class="btn btn-outline btn-small" onclick="closeSettings()">取消</button>
      <button class="btn btn-primary btn-small" onclick="saveApiKey()">保存</button>
    </div>
    <div id="apiStatus" style="font-size:0.75rem;color:var(--success);display:none;">✅ API Key 已配置</div>
  </div>
</div>
<div class="container">
  <div class="header">
    <h1>🔤 Vocabulary Activation</h1>
    <div class="subtitle">从"认得"到"会用" — B1 高频词活化 · 含词根/搭配/造句检查</div>
    <div id="screeningBadge" style="margin-top:6px;display:none;">
      <span style="display:inline-block;padding:3px 10px;border-radius:20px;background:rgba(102,187,106,0.15);color:var(--success);font-size:0.72rem;font-weight:600;">🎯 已加载筛查数据 · 优先活化"认识不会用"的词</span>
    </div>
    <div style="font-size:0.75rem;color:var(--muted);margin-top:4px;">
      ← <a href="screening.html" target="_blank" style="color:var(--accent);text-decoration:none;">返回筛词诊断</a>
    </div>
  </div>
  <div class="stats-row" id="statsRow">
    <div class="stat-item streak"><div class="stat-num" id="streakCount">0</div><div class="stat-label">连续天数</div></div>
    <div class="stat-item mastered"><div class="stat-num" id="masteredCount">0</div><div class="stat-label">已掌握</div></div>
    <div class="stat-item"><div class="stat-num" id="totalPracticed">0</div><div class="stat-label">总练习量</div></div>
    <div class="stat-item"><div class="stat-num" id="remainingCount">200</div><div class="stat-label">剩余新词</div></div>
  </div>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
  <div class="card" id="mainCard"></div>
  <div style="text-align:center;margin-top:4px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
    <button onclick="exportData()" style="background:transparent;border:1px solid var(--border);color:var(--muted);padding:4px 14px;border-radius:6px;font-size:0.72rem;cursor:pointer;font-family:inherit;">📤 导出数据</button>
    <button onclick="importData()" style="background:transparent;border:1px solid var(--border);color:var(--muted);padding:4px 14px;border-radius:6px;font-size:0.72rem;cursor:pointer;font-family:inherit;">📥 导入数据</button>
  </div>
</div>
<div id="toastContainer"></div>

<script src="wordbank.js"></script>
<script src="word-families.js"></script>
<script>const WORD_BANK = WORD_BANK_W;
// ============================================================
// APP STATE
// ============================================================
const STORAGE_KEY = 'vocab_flashcards_v2';
function loadState() {
  try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) return JSON.parse(raw); } catch(e) {}
  return { mastered:{}, needPractice:{}, sessionHistory:[], totalPracticed:0, currentStreak:0, lastPracticeDate:null, wordPracticeCount:{} };
}
function saveState(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }
let state = loadState();
let sessionWords=[], currentWordIndex=0, currentStep='definition', userSentence='', activeTab='word';

// ============================================================
// SESSION LOGIC
// ============================================================
function getNeedsPracticeWords() { return Object.keys(state.needPractice).map(Number).filter(i=>state.needPractice[i]); }
function getNewWords() {
  const all=new Set(WORD_BANK.map((_,i)=>i));
  const mastered=new Set(Object.keys(state.mastered).map(Number).filter(i=>state.mastered[i]));
  const needP=new Set(getNeedsPracticeWords());
  // Also exclude words marked "mastered" in screening
  const scr=loadScreening();
  const scrMastered=new Set(scr&&scr.results?Object.entries(scr.results).filter(([,v])=>v==='mastered').map(([k])=>parseInt(k)):[]);
  return [...all].filter(i=>!mastered.has(i)&&!needP.has(i)&&!scrMastered.has(i));
}
function getLearnedWords() { return Object.keys(state.mastered).map(Number).filter(i=>state.mastered[i]); }

// ── 读取筛查结果 ──
function loadScreening(){
  // Try v3 first (默写法), then v2 (按钮法)
  try{const r=localStorage.getItem('vocab_screening_v3');if(r)return JSON.parse(r);}catch(e){}
  try{const r=localStorage.getItem('vocab_screening_v2');if(r)return JSON.parse(r);}catch(e){}
  return null;
}
function getScreeningLevels(){
  const scr=loadScreening();
  if(!scr||!scr.results)return null;
  const levels={passive:[],unknown:[],mastered:[]};
  for(const[k,v]of Object.entries(scr.results)){
    const idx=parseInt(k);
    // v2 'vague' → treat as 'passive' (also needs activation)
    const lv=(v==='vague')?'passive':v;
    if(levels[lv])levels[lv].push(idx);
  }
  return levels;
}

function pickSessionWords(count=10) {
  const result=[], shuffle=arr=>{for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;};
  const levels=getScreeningLevels();
  const needsP=getNeedsPracticeWords();

  if(levels){
    // 🎯 Priority 1: "passive" (认识不会用) — the activation sweet spot
    let passivePool=shuffle([...levels.passive]);
    const takePassive=Math.min(5,passivePool.length);
    result.push(...passivePool.slice(0,takePassive));

    // 🔄 Priority 2: words marked "need practice" from previous sessions
    let reviewPool=shuffle(needsP.filter(i=>!result.includes(i)));
    const takeReview=Math.min(3,reviewPool.length);
    result.push(...reviewPool.slice(0,takeReview));

    // 🤔 Priority 3: remaining passive pool as filler
    let remainingPassive=shuffle(levels.passive.filter(i=>!result.includes(i)));
    result.push(...remainingPassive.slice(0,count-result.length));

    // 😰 Priority 4: "unknown" — include 1 for gradual exposure
    if(result.length<count){
      let unknownPool=shuffle(levels.unknown.filter(i=>!result.includes(i)));
      result.push(...unknownPool.slice(0,Math.min(1,unknownPool.length)));
    }

    // Fill remaining from passive/vague pool
    if(result.length<count){
      const fill=shuffle([...levels.passive,...levels.unknown].filter(i=>!result.includes(i)));
      for(const w of fill){if(result.length>=count)break;result.push(w);}
    }
  } else {
    // No screening data — fallback to original algorithm
    let reviewPool=shuffle([...needsP]);
    result.push(...reviewPool.slice(0,Math.min(4,reviewPool.length)));
    if(getLearnedWords().length>10&&result.length<count) result.push(shuffle([...getLearnedWords()])[0]);
    let newPool=shuffle([...getNewWords()]);
    result.push(...newPool.slice(0,count-result.length));
    if(result.length<count){
      const fill=shuffle([...reviewPool,...getLearnedWords()]), used=new Set(result);
      for(const w of fill){if(result.length>=count)break;if(!used.has(w))result.push(w);}
    }
  }
  return shuffle(result.slice(0,count));
}

function updateStreak(){
  const today=new Date().toISOString().split('T')[0];
  if(state.lastPracticeDate===today)return;
  const yesterday=new Date(Date.now()-86400000).toISOString().split('T')[0];
  if(state.lastPracticeDate===yesterday||state.lastPracticeDate===today){if(state.lastPracticeDate!==today)state.currentStreak++;}
  else if(state.lastPracticeDate===null)state.currentStreak=1;
  else state.currentStreak=1;
  state.lastPracticeDate=today;saveState(state);
}

// ============================================================
// AI PROMPT GENERATOR
// ============================================================
function buildAICheckPrompt(wordData, userSent) {
  return `你是一个英语老师。请检查我造的句子是否有问题。

单词：${wordData.w} (${wordData.pos})
释义：${wordData.def}
参考例句：${wordData.ex}

我的句子：${userSent || '(没有写句子)'}

请按以下格式帮我批改：
🔴 语法错误：如果有，指出错误在哪，正确应该怎么写
🟡 表达不自然：如果读起来像中式英语，给出 native speaker 的地道说法
🟢 正确之处：如果写得好，表扬一下
💡 升级版：用 ${wordData.w} 造一个更高级/更自然的句子供我学习
📝 常见搭配：列出 ${wordData.w} 的 2-3 个常用搭配

用中文回复，例句用英文。`;
}

function copyAIPrompt() {
  const wordData = WORD_BANK[sessionWords[currentWordIndex]];
  const prompt = buildAICheckPrompt(wordData, userSentence);
  navigator.clipboard.writeText(prompt).then(()=>{
    showToast('✅ AI 检查 prompt 已复制！粘贴到 ChatGPT / Claude 即可');
    const btn=document.getElementById('aiCheckBtn');
    if(btn){btn.textContent='✅ 已复制，去粘贴';btn.classList.add('copied');setTimeout(()=>{btn.textContent='🤖 AI 深度检查我的句子';btn.classList.remove('copied');},2000);}
  }).catch(()=>showToast('复制失败，请手动选择文字'));
}

// ============================================================
// UI RENDERING
// ============================================================
function updateStats(){
  document.getElementById('streakCount').textContent=state.currentStreak;
  document.getElementById('masteredCount').textContent=Object.keys(state.mastered).filter(k=>state.mastered[k]).length;
  document.getElementById('totalPracticed').textContent=state.totalPracticed;
  document.getElementById('remainingCount').textContent=getNewWords().length;
  document.getElementById('progressBar').style.width=Math.min(100,(Object.keys(state.mastered).filter(k=>state.mastered[k]).length/200)*100)+'%';
}

function renderStep(){
  const card=document.getElementById('mainCard');
  const w=WORD_BANK[sessionWords[currentWordIndex]];
  const n=`第 ${currentWordIndex+1}/${sessionWords.length} 个`;

  if(currentStep==='definition'){
    card.className='card';
    card.innerHTML=`
      <div class="card-number">${n}</div>
      <div class="category-badge">${w.cat}</div>
      <div class="card-word">${w.w}</div>
      <div style="font-size:0.85rem;color:var(--muted);margin-top:-10px;">${PH[w.w]||''}</div>
      <div class="card-definition"><span class="pos-tag">${w.pos}</span><div style="margin-top:8px;">${w.def}</div></div>
      <div class="btn-row">
        <button class="btn btn-outline btn-small" onclick="skipWord()">跳过</button>
        <button class="btn btn-primary" onclick="showInput()">我来造个句 →</button>
      </div>`;
  } else if(currentStep==='input'){
    card.className='card flipped';
    card.innerHTML=`
      <div class="card-number">${n}</div>
      <div style="font-size:1.4rem;font-weight:700;color:#fff;">${w.w}</div>
      <div style="font-size:0.8rem;color:var(--muted);margin-top:-8px;">${PH[w.w]||""}</div>
      <div class="card-definition" style="font-size:0.88rem;"><span class="pos-tag">${w.pos}</span> ${w.def}</div>
      <div class="input-area">
        <textarea id="userInput" placeholder="用 ${w.w} 造一个贴近你生活的句子..." autofocus></textarea>
        <div class="hint">💡 写你自己的句子,哪怕不完美也没关系</div>
      </div>
      <div class="btn-row">
        <button class="btn btn-outline btn-small" onclick="skipWord()">跳过</button>
        <button class="btn btn-primary" id="submitBtn" onclick="submitSentence()">提交对照 →</button>
      </div>`;
    setTimeout(()=>{const ta=document.getElementById('userInput');if(ta)ta.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();submitSentence();}});},100);
  } else if(currentStep==='result'){
    card.className='card flipped';
    // Determine tabs based on available data
    const hasRoot = !!w.root;
    const hasColl = !!w.coll;
    const hasTips = !!w.tips;

    card.innerHTML=`
      <div class="card-number">${n}</div>
      <div style="font-size:1.3rem;font-weight:700;color:#fff;">${w.w} <span class="pos-tag">${w.pos}</span></div>
      <div style="font-size:0.78rem;color:var(--muted);margin-top:-6px;">${PH[w.w]||""}</div>

      <!-- Sentences -->
      <div class="result-section">
        ${userSentence ? `
          <div class="sentence-box user">
            <span class="s-label">✏️ 你的句子</span>
            ${escapeHtml(userSentence)}
          </div>` : `<div class="sentence-box user" style="border-left-color:var(--muted);"><span class="s-label" style="color:var(--muted);">✏️ 你的句子</span><span style="color:var(--muted);">（未写句子）</span></div>`}
        <div class="sentence-box model">
          <span class="s-label">✅ 参考例句</span>
          ${w.ex}
        </div>
      </div>

      <!-- AI Check -->
      <div class="ai-check-box">
        <div class="ai-hint" id="aiHint">🤖 DeepSeek AI 批改</div>
        <button class="btn-ai-check" id="aiCheckBtn" onclick="checkWithAI()">🔍 AI 检查我的句子</button>
        <div class="ai-feedback" id="aiFeedback">
          <div class="ai-label">🤖 AI 批改结果</div>
          <div id="aiFeedbackContent"></div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" data-tab="word" onclick="switchTab('word')">📖 词根详解</button>
        <button class="tab-btn" data-tab="usage" onclick="switchTab('usage')">💡 用法提示</button>
        <button class="tab-btn" data-tab="family" onclick="switchTab('family')">🔗 相关词汇</button>
      </div>

      <!-- Tab: Word Details (Etymology / Root) -->
      <div class="tab-panel active" id="tab-word">
        ${w.root ? `<div class="detail-item"><div class="d-label">🧬 词根词缀拆解</div><div class="d-content">${w.root}</div></div>` : '<div class="detail-item"><div class="d-content" style="color:var(--muted);">该词暂无词根解析数据</div></div>'}
        <div class="detail-item" style="background:rgba(79,195,247,0.05);border:1px solid rgba(79,195,247,0.15);">
          <div class="d-label" style="color:var(--accent);">📖 英文释义</div>
          <div class="d-content">${w.def}</div>
        </div>
      </div>

      <!-- Tab: Usage Tips -->
      <div class="tab-panel" id="tab-usage">
        ${w.coll ? `<div class="detail-item"><div class="d-label">🔗 常见搭配</div><div class="d-content">${w.coll}</div></div>` : ''}
        ${w.tips ? `<div class="detail-item"><div class="d-label">⚠️ 注意事项</div><div class="d-content">${w.tips}</div></div>` : ''}
        ${!w.coll && !w.tips ? '<div class="detail-item"><div class="d-content" style="color:var(--muted);">暂无额外用法提示</div></div>' : ''}
        <div class="detail-item">
          <div class="d-label">✅ 参考例句</div>
          <div class="d-content" style="font-style:italic;">${w.ex}</div>
        </div>
      </div>

      <!-- Tab: Related Words -->
      <div class="tab-panel" id="tab-family">
        ${w.syn ? `<div class="detail-item"><div class="d-label">🔄 近义词</div><div class="d-content">${w.syn}</div></div>` : ''}
        ${w.family ? `<div class="detail-item"><div class="d-label">📦 同根/同族词</div><div class="d-content">${w.family}</div></div>` : ''}
        ${!w.syn && !w.family ? '<div class="detail-item"><div class="d-content" style="color:var(--muted);">暂无相关词汇数据</div></div>' : ''}
      </div>

      ${renderWordFamilyHTML(w.w)}
      <!-- Rate -->
      <div class="btn-row" style="margin-top:4px;">
        <button class="btn btn-warning" onclick="rateWord('practice')">🔄 还需练习</button>
        <button class="btn btn-success" onclick="rateWord('got')">✅ 我掌握了</button>
      </div>`;
  }
}

function switchTab(name) {
  activeTab = name;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  const btn=document.querySelector(`[data-tab="${name}"]`);
  const panel=document.getElementById(`tab-${name}`);
  if(btn)btn.classList.add('active');
  if(panel)panel.classList.add('active');
}

function escapeHtml(str){const d=document.createElement('div');d.textContent=str;return d.innerHTML;}

function showToast(msg){
  const c=document.getElementById('toastContainer');
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  c.appendChild(t);setTimeout(()=>t.remove(),2500);
}

// ============================================================
// ACTIONS
// ============================================================
function showInput(){currentStep='input';renderStep();}
function submitSentence(){
  const input=document.getElementById('userInput');
  userSentence=input?input.value.trim():'';
  currentStep='result';activeTab='word';
  renderStep();
}
function skipWord(){
  const idx=sessionWords[currentWordIndex];
  state.needPractice[idx]=true;state.totalPracticed++;
  state.wordPracticeCount[idx]=(state.wordPracticeCount[idx]||0)+1;
  saveState(state);nextWord();
}
function rateWord(rating){
  const idx=sessionWords[currentWordIndex];
  state.totalPracticed++;state.wordPracticeCount[idx]=(state.wordPracticeCount[idx]||0)+1;
  if(rating==='got'){state.mastered[idx]=true;state.needPractice[idx]=false;}
  else{state.needPractice[idx]=true;state.mastered[idx]=false;}
  saveState(state);nextWord();
}
function nextWord(){
  currentWordIndex++;userSentence='';currentStep='definition';activeTab='word';
  if(currentWordIndex>=sessionWords.length){updateStreak();showCompletion();}
  else{updateStats();renderStep();}
}
function showCompletion(){
  saveState(state);updateStats();
  const got=sessionWords.filter(i=>state.mastered[i]).length;
  document.getElementById('mainCard').className='card';
  document.getElementById('mainCard').innerHTML=`
    <div class="completion">
      <div class="emoji">🎉</div>
      <h2>今天的 10 个词完成！</h2>
      <div class="summary">
        本次掌握 <strong style="color:var(--success)">${got}</strong> 个<br>
        还需练习 <strong style="color:var(--warning)">${sessionWords.length-got}</strong> 个<br><br>
        累计掌握 <strong style="color:var(--success)">${Object.keys(state.mastered).filter(k=>state.mastered[k]).length}</strong>/200<br>
        连续 <strong style="color:var(--warning)">${state.currentStreak}</strong> 天 🔥
      </div>
      <div class="btn-row" style="margin-top:20px;">
        <button class="btn btn-warning" onclick="reviewNeedPractice()">🔄 复习薄弱词</button>
        <button class="btn btn-primary" onclick="startNewSession()">🔤 再来一组</button>
      </div>
    </div>`;
}
function reviewNeedPractice(){
  const needP=getNeedsPracticeWords();
  if(needP.length===0){showToast('暂无待复习词！');return;}
  const shuffle=arr=>{for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;};
  sessionWords=shuffle([...needP]).slice(0,Math.min(10,needP.length));
  currentWordIndex=0;currentStep='definition';userSentence='';activeTab='word';updateStats();renderStep();
}
function startNewSession(){
  sessionWords=pickSessionWords(10);
  currentWordIndex=0;currentStep='definition';userSentence='';activeTab='word';updateStats();renderStep();
}

// ============================================================
// DEEPSEEK API INTEGRATION
// ============================================================
const API_KEY_STORAGE = 'deepseek_api_key';

function getApiKey(){ return localStorage.getItem(API_KEY_STORAGE)||''; }
function setApiKey(k){ localStorage.setItem(API_KEY_STORAGE,k); }
function hasApiKey(){ return !!getApiKey(); }

function openSettings(){
  document.getElementById('modalOverlay').classList.add('show');
  const inp=document.getElementById('apiKeyInput');
  inp.value=getApiKey();
  document.getElementById('apiStatus').style.display=getApiKey()?'block':'none';
  setTimeout(()=>inp.focus(),100);
}
function closeSettings(){ document.getElementById('modalOverlay').classList.remove('show'); }
function saveApiKey(){
  const key=document.getElementById('apiKeyInput').value.trim();
  if(!key){alert('请输入 API Key');return;}
  if(!key.startsWith('sk-')){alert('API Key 应该以 sk- 开头，请检查');return;}
  setApiKey(key);
  document.getElementById('apiStatus').style.display='block';
  document.getElementById('aiHint').textContent='🤖 DeepSeek AI 批改 · 已就绪';
  setTimeout(closeSettings,500);
}

async function checkWithAI(){
  const apiKey=getApiKey();
  if(!apiKey){openSettings();return;}

  const wordData=WORD_BANK[sessionWords[currentWordIndex]];
  const fb=document.getElementById('aiFeedback');
  const content=document.getElementById('aiFeedbackContent');
  const btn=document.getElementById('aiCheckBtn');
  const hint=document.getElementById('aiHint');

  btn.disabled=true; btn.textContent='⏳ AI 分析中...';
  fb.classList.add('show','loading');
  content.textContent='正在调用 DeepSeek 分析你的句子…';

  const prompt=`你是一个英语老师。请检查以下造句，用中文回复。

单词：${wordData.w} (${wordData.pos})
释义：${wordData.def}
参考例句：${wordData.ex}

学生写的句子：${userSentence||'(未写句子)'}

请按以下格式回复：
🔴 **语法问题**：如果有语法错误，指出并改正
🟡 **表达是否地道**：读起来像中式英语吗？如果是，给出地道说法
🟢 **写得好的地方**：如果某处表达不错，表扬一下
💡 **升级建议**：用这个词造一个更高级/自然的句子供参考

如果没有写句子，请鼓励学生尝试写一句。`;

  try{
    const res=await fetch('https://api.deepseek.com/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body:JSON.stringify({model:'deepseek-chat',messages:[{role:'user',content:prompt}],max_tokens:600,temperature:0.7})
    });
    if(!res.ok){
      const err=await res.text();
      if(res.status===401)throw new Error('API Key 无效，请检查设置');
      throw new Error('API 错误 ('+res.status+'): '+err.slice(0,100));
    }
    const data=await res.json();
    const reply=data.choices[0].message.content;
    fb.classList.remove('loading');
    content.innerHTML=reply.replace(/\n/g,'<br>').replace(/\*\*(.+?)\*\*/g,'<strong style="color:var(--accent);">$1</strong>');
    hint.textContent='🤖 DeepSeek AI 批改 · 完成';
  }catch(e){
    fb.classList.remove('loading');
    content.textContent='❌ '+e.message;
    hint.textContent='🤖 批改失败，点击重试';
  }
  btn.disabled=false; btn.textContent='🔍 AI 检查我的句子';
}

// Init
// ── 导入导出 ──
function exportData(){
  const data={screening:JSON.parse(localStorage.getItem("vocab_screening_v3")||"null"),flashcards:JSON.parse(localStorage.getItem("vocab_flashcards_v2")||"null"),exportedAt:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download="english-practice-backup.json";a.click();
  URL.revokeObjectURL(url);showToast("✅ 数据已导出");
}
function importData(){
  const input=document.createElement("input");input.type="file";input.accept=".json";
  input.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(data.screening)localStorage.setItem("vocab_screening_v3",JSON.stringify(data.screening));
        if(data.flashcards)localStorage.setItem("vocab_flashcards_v2",JSON.stringify(data.flashcards));
        showToast("✅ 导入成功，刷新中…");setTimeout(()=>location.reload(),600);
      }catch(err){showToast("❌ 文件格式错误");}
    };
    reader.readAsText(file);
  };
  input.click();
}

function init(){
  // Show screening badge if data exists
  const scr=loadScreening();
  if(scr&&Object.keys(scr.results||{}).length>0){
    const badge=document.getElementById('screeningBadge');
    if(badge)badge.style.display='block';
  }
  // Show API status
  if(hasApiKey()){const h=document.getElementById('aiHint');if(h)h.textContent='🤖 DeepSeek AI 批改 · 已就绪';}
  updateStats();
  sessionWords=pickSessionWords(10);
  currentWordIndex=0;currentStep='definition';activeTab='word';renderStep();
  document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'&&currentStep==='definition')showInput();});
}
init();
</script>
